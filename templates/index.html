<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PulseAI | API Observability</title>
    
 
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
       
            --bg-base: #09090b;
            --bg-surface: #18181b;
            --bg-panel: #111113;
            --border: #27272a;
            --border-hover: #3f3f46;
            
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            
            --accent-primary: #8b5cf6;
            --accent-primary-hover: #7c3aed;
            --accent-secondary: #2563eb;
            
            --status-critical: #ef4444;
            --status-high: #f59e0b;
            --status-low: #10b981;
            --status-info: #3b82f6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% 0%, rgba(139, 92, 246, 0.05) 0%, transparent 50%);
        }

       
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }

       
        header {
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(9, 9, 11, 0.8);
            backdrop-filter: blur(12px);
            z-index: 10;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 1.25rem;
            letter-spacing: -0.5px;
        }

        .logo-icon {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: var(--text-muted);
            background: var(--bg-surface);
            padding: 4px 12px;
            border-radius: 100px;
            border: 1px solid var(--border);
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background: var(--status-low);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--status-low);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            70% { box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

       
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            flex: 1;
            overflow: hidden;
        }

        .panel {
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            overflow-y: auto;
        }

        .panel-left {
            border-right: 1px solid var(--border);
            background: var(--bg-panel);
        }

        .panel-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        
        .editor-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            transition: border 0.3s ease;
        }

        .editor-container:focus-within {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 1px var(--accent-primary);
        }

        .editor-header {
            background: var(--bg-base);
            padding: 8px 16px;
            border-bottom: 1px solid var(--border);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-muted);
            display: flex;
            gap: 6px;
        }

        .mac-dot { width: 10px; height: 10px; border-radius: 50%; }
        .dot-red { background: #ff5f56; }
        .dot-yellow { background: #ffbd2e; }
        .dot-green { background: #27c93f; }

        textarea {
            flex: 1;
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            padding: 16px;
            resize: none;
            outline: none;
            line-height: 1.6;
        }

       
        .actions {
            display: flex;
            gap: 12px;
            margin-top: 10px;
        }

        button {
            flex: 1;
            padding: 12px 24px;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: var(--text-main);
            color: var(--bg-base);
            border: none;
        }
        .btn-primary:hover { background: #d4d4d8; transform: translateY(-1px); }

        .btn-secondary {
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover { background: var(--bg-surface); border-color: var(--border-hover); transform: translateY(-1px); }

        button:disabled { opacity: 0.7; cursor: not-allowed; transform: none !important; }

       
        #empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            text-align: center;
            opacity: 0.6;
        }

        #empty-state svg { width: 48px; height: 48px; margin-bottom: 16px; }

        .result-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            display: none;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

      
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 24px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }

        .metric-box { display: flex; flex-direction: column; gap: 8px; }
        .metric-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; font-weight: 600; }
        .metric-value { font-size: 1.5rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }

       
        .badge {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        
        .badge.critical { background: rgba(239, 68, 68, 0.1); color: var(--status-critical); border: 1px solid rgba(239, 68, 68, 0.2); }
        .badge.high { background: rgba(245, 158, 11, 0.1); color: var(--status-high); border: 1px solid rgba(245, 158, 11, 0.2); }
        .badge.low { background: rgba(16, 185, 129, 0.1); color: var(--status-low); border: 1px solid rgba(16, 185, 129, 0.2); }

        
        h3 { font-size: 1rem; margin: 20px 0 10px 0; color: var(--text-main); font-weight: 600; }
        
        .root-cause-box {
            background: rgba(239, 68, 68, 0.05);
            border-left: 3px solid var(--status-critical);
            padding: 12px 16px;
            border-radius: 0 8px 8px 0;
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        ul { list-style: none; display: flex; flex-direction: column; gap: 10px; }
        ul li {
            position: relative;
            padding-left: 24px;
            font-size: 0.9rem;
            color: #d4d4d8;
            line-height: 1.5;
        }
        ul li::before {
            content: "→";
            position: absolute;
            left: 0;
            color: var(--text-muted);
            font-family: monospace;
        }

     
        pre {
            background: #000;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            overflow-x: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: #a6accd;
            line-height: 1.6;
            display: none;
            animation: fadeIn 0.4s ease-out;
            margin-top: 16px;
        }

       
        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <span class="logo-icon">▲</span> PulseAI
        </div>
        <div class="status-badge">
            <div class="pulse-dot"></div>
            System Online
        </div>
    </header>

    <div class="container">
       
        <div class="panel panel-left">
            <div class="panel-title">
                <span>Raw Log Ingestion</span>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
            </div>
            
            <div class="editor-container">
                <div class="editor-header">
                    <div class="mac-dot dot-red"></div>
                    <div class="mac-dot dot-yellow"></div>
                    <div class="mac-dot dot-green"></div>
                    <span style="margin-left: 10px;">/var/log/syslog</span>
                </div>
                <textarea id="logs" spellcheck="false">POST /payment → 500 error
GET /auth → timeout
PUT /users → database overload</textarea>
            </div>

            <div class="actions">
                <button class="btn-primary" id="btn-analyze" onclick="analyzeLogs()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    Analyze Telemetry
                </button>
                <button class="btn-secondary" id="btn-fix" onclick="generateFix()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                    Generate Fix Script
                </button>
            </div>
        </div>

       
        <div class="panel panel-right">
            <div class="panel-title">Observability Output</div>

            <div id="empty-state">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 12h4l3-9 5 18 3-9h5"></path></svg>
                <h3>Awaiting Telemetry</h3>
                <p style="margin-top: 8px; font-size: 0.9rem;">Run an analysis or generate a fix to see results here.</p>
            </div>

            <div id="result" class="result-card"></div>
            <pre id="script"></pre>
        </div>
    </div>

<script>
  
    function setLoadingState(btnId, isSubmitting, text) {
        const btn = document.getElementById(btnId);
        if (isSubmitting) {
            btn.disabled = true;
            btn.dataset.originalHTML = btn.innerHTML;
            btn.innerHTML = `<svg class="spin" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"></path></svg> ${text}`;
        } else {
            btn.disabled = false;
            btn.innerHTML = btn.dataset.originalHTML;
        }
    }

    function hideEmptyState() {
        document.getElementById('empty-state').style.display = 'none';
    }

   
    function getSeverityClass(severityStr) {
        const s = (severityStr || '').toLowerCase();
        if(s.includes('critical') || s.includes('high')) return 'critical';
        if(s.includes('medium')) return 'high';
        return 'low';
    }

    async function analyzeLogs() {
        const logs = document.getElementById("logs").value;
        if (!logs.trim()) return;

        setLoadingState('btn-analyze', true, 'Analyzing...');
        
        try {
            const response = await fetch("/analyze", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({logs})
            });

            const data = await response.json();
            const res = data.analysis;
            
            hideEmptyState();
            document.getElementById("script").style.display = "none";
            
            const resultBox = document.getElementById("result");
            resultBox.style.display = "block";

           
            const sevClass = getSeverityClass(res.severity);
            const scoreColor = res.score < 50 ? 'var(--status-low)' : (res.score < 80 ? 'var(--status-high)' : 'var(--status-critical)');

            resultBox.innerHTML = `
                <div class="metrics-grid">
                    <div class="metric-box">
                        <span class="metric-label">Severity</span>
                        <div class="metric-value"><span class="badge ${sevClass}">${res.severity || 'Unknown'}</span></div>
                    </div>
                    <div class="metric-box">
                        <span class="metric-label">Health Score</span>
                        <div class="metric-value" style="color: ${scoreColor}">${res.score || '0'}<span style="font-size: 0.9rem; color: var(--text-muted)">/100</span></div>
                    </div>
                    <div class="metric-box">
                        <span class="metric-label">Alert Status</span>
                        <div class="metric-value"><span class="badge ${res.alert === 'Active' ? 'critical' : 'low'}">${res.alert || 'N/A'}</span></div>
                    </div>
                </div>

                <h3>Detected Root Cause</h3>
                <div class="root-cause-box">
                    ${res.root_cause || 'No specific root cause identified in current telemetry.'}
                </div>

                <h3>Failure Clusters</h3>
                <ul>
                    ${res.clusters && res.clusters.length ? res.clusters.map(c => `<li>${c}</li>`).join("") : '<li>No clusters detected.</li>'}
                </ul>

                <h3>Recommended Action Plan</h3>
                <ul>
                    ${res.fixes && res.fixes.length ? res.fixes.map(f => `<li>${f}</li>`).join("") : '<li>Manual review required.</li>'}
                </ul>

                <div style="margin-top: 24px; font-size: 0.75rem; color: var(--text-muted); text-align: right; font-family: 'JetBrains Mono', monospace;">
                    Timestamp: ${res.timestamp || new Date().toISOString()}
                </div>
            `;
        } catch (error) {
            console.error(error);
            alert("Error communicating with backend API.");
        } finally {
            setLoadingState('btn-analyze', false);
        }
    }

    async function generateFix() {
        const logs = document.getElementById("logs").value;
        if (!logs.trim()) return;

        setLoadingState('btn-fix', true, 'Generating...');

        try {
            const response = await fetch("/generate_fix", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({logs})
            });

            const data = await response.json();
            
            hideEmptyState();
            document.getElementById("result").style.display = "none";
            
            const scriptBox = document.getElementById("script");
            scriptBox.style.display = "block";
          
            scriptBox.innerHTML = `<span style="color: #8b5cf6;">#!/bin/bash</span>\n<span style="color: var(--text-muted);"># Auto-generated fix by PulseAI</span>\n\n${data.script || 'echo "No script generated."'}`;
            
        } catch (error) {
            console.error(error);
            alert("Error generating fix script.");
        } finally {
            setLoadingState('btn-fix', false);
        }
    }
</script>

</body>
</html>
